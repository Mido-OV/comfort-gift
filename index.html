<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Little Bunny 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #e4d0ff, #f3e8ff);
  font-family: 'Caveat', cursive;
  text-align: center;
  padding: 40px;
  color: #4b2e83;
  overflow-x: hidden;
}

/* ===== HEADER ===== */
.typewriter {
  margin: auto;
  font-size: 50px;
  max-width: 100%;
  pointer-events: none; /* 🔥 IMPORTANT: allows clicks through */
}

.subtitle {
  font-size: 28px;
  margin-top: 20px;
  pointer-events: none;
}

p {
  font-size: 30px;
  pointer-events: none;
}

/* ===== MESSAGE ===== */
.message-box {
  font-size: 30px;
  margin-top: 30px;
  min-height: 70px;
  opacity: 0;
  transition: opacity 0.5s ease;
}

/* ===== BUTTON ===== */
button {
  margin-top: 25px;
  padding: 14px 28px;
  font-size: 24px;
  border-radius: 30px;
  border: none;
  background-color: #b388ff;
  color: white;
  cursor: pointer;
  transition: 0.3s;
  position: relative;
  z-index: 10; /* 🔥 stays clickable */
}

button:hover {
  background-color: #9c64ff;
  transform: scale(1.05);
}

.counter {
  margin-top: 15px;
  font-size: 22px;
}

/* ===== BIG HEART ===== */
.big-heart {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 220px;
  color: #c084fc;
  opacity: 0;
  pointer-events: none;
  transition: transform 0.6s ease, opacity 0.6s ease;
  z-index: 9999;
}

.big-heart.show {
  transform: translate(-50%, -50%) scale(1.4);
  opacity: 0.95;
}

/* ===== FLOATING HEARTS ===== */
.floating-heart {
  position: fixed;
  bottom: -50px;
  font-size: 26px;
  color: #c084fc;
  animation: floatUp 6s linear forwards;
  opacity: 0.7;
  pointer-events: none;
  z-index: 9998;
}

@keyframes floatUp {
  from { transform: translateY(0); }
  to { transform: translateY(-120vh); }
}

/* ===== BUNNY ===== */
.bunny {
  position: fixed;
  top: -50px;
  font-size: 30px;
  animation: fall 5s linear forwards;
  pointer-events: none;
  z-index: 9997;
}

@keyframes fall {
  to { transform: translateY(120vh); }
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
  body { padding: 20px; }
  .typewriter { font-size: 28px; }
  .subtitle { font-size: 20px; }
  p { font-size: 20px; }
  .message-box { font-size: 22px; }
  button { font-size: 18px; }
  .big-heart { font-size: 140px; }
}
</style>
</head>

<body>

<h1 class="typewriter">
You Don’t Have To Carry Everything Alone, Little Bunny 💜
</h1>

<div class="subtitle">Especially not on days like today.</div>

<p>
Even strong girls like you get tired.<br>
This little purple world exists just for you.
</p>

<button onclick="dropWeight()">Drop One Worry 💜</button>

<div class="message-box" id="message"></div>
<div class="counter" id="counter">0 / 5 comfort drops</div>

<div class="big-heart" id="heart">💜</div>

<script>
let clicks = 0;

const messages = [
  "Little Bunny, you handled more than you realize today.",
  "It’s okay to rest. The world can wait.",
  "Maya definitely thinks you’re her safe place.",
  "Not everything needs to be solved tonight.",
  "You deserve softness, especially after days like this."
];

function dropWeight() {
  clicks++;

  const messageBox = document.getElementById("message");
  const counter = document.getElementById("counter");
  const heart = document.getElementById("heart");

  messageBox.textContent = messages[Math.min(clicks - 1, messages.length - 1)];
  messageBox.style.opacity = 1;
  counter.textContent = clicks + " / 5 comfort drops";

  heart.classList.add("show");
  setTimeout(() => heart.classList.remove("show"), 600);

  const float = document.createElement("div");
  float.className = "floating-heart";
  float.innerHTML = "💜";
  float.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(float);
  setTimeout(() => float.remove(), 6000);

  if (clicks === 5) bunnyRain();
}

function bunnyRain() {
  for (let i = 0; i < 20; i++) {
    const bunny = document.createElement("div");
    bunny.className = "bunny";
    bunny.innerHTML = "🐰";
    bunny.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(bunny);
    setTimeout(() => bunny.remove(), 5000);
  }
}
</script>

</body>
</html>
