<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Little Bunny 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #e4d0ff, #f3e8ff);
  font-family: 'Caveat', cursive;
  text-align: center;
  padding: 40px;
  color: #4b2e83;
  overflow: hidden;
}

/* Handwriting animation */
.typewriter {
  overflow: hidden;
  white-space: nowrap;
  border-right: 3px solid #4b2e83;
  width: 0;
  margin: auto;
  font-size: 50px;
  animation: typing 3s steps(40, end) forwards, blink 0.7s infinite;
}

@keyframes typing {
  from { width: 0 }
  to { width: 100% }
}

@keyframes blink {
  50% { border-color: transparent }
}

.subtitle {
  font-size: 28px;
  margin-top: 20px;
}

.message-box {
  font-size: 30px;
  margin-top: 30px;
  min-height: 70px;
  opacity: 0;
  transition: opacity 0.5s ease;
}

button {
  margin-top: 25px;
  padding: 14px 28px;
  font-size: 24px;
  border-radius: 30px;
  border: none;
  background-color: #b388ff;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background-color: #9c64ff;
  transform: scale(1.05);
}

.counter {
  margin-top: 15px;
  font-size: 22px;
}

/* BIG HEART */
.big-heart {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 220px;
  color: #c084fc;
  opacity: 0;
  pointer-events: none;
  transition: all 0.8s ease;
}

.big-heart.show {
  transform: translate(-50%, -50%) scale(1.6);
  opacity: 0.95;
}

/* Floating hearts */
.floating-heart {
  position: fixed;
  bottom: -50px;
  font-size: 24px;
  color: #c084fc;
  animation: floatUp 6s linear infinite;
  opacity: 0.7;
}

@keyframes floatUp {
  0% { transform: translateY(0) rotate(0deg); }
  100% { transform: translateY(-110vh) rotate(360deg); }
}

/* Bunny rain */
.bunny {
  position: fixed;
  top: -50px;
  font-size: 28px;
  animation: fall 5s linear forwards;
}

@keyframes fall {
  to { transform: translateY(110vh); }
}
</style>
</head>

<body>

<h1 class="typewriter">You Don’t Have To Carry Everything Alone, Little Bunny 💜</h1>

<div class="subtitle">Especially not on days like today.</div>

<p style="font-size:30px;">
Even strong girls like you get tired.<br>
This little purple world exists just for you.
</p>

<button onclick="dropWeight()">Drop One Worry 💜</button>

<div class="message-box" id="message"></div>
<div class="counter" id="counter">0 / 5 comfort drops</div>

<div class="big-heart" id="heart">💜</div>

<!-- Soft Piano -->
<audio autoplay loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8f8c1c1f2.mp3" type="audio/mpeg">
</audio>

<script>
let clicks = 0;

const messages = [
  "Little Bunny, you handled more than you realize today.",
  "It’s okay to rest. The world can wait.",
  "Maya definitely thinks you’re her safe place.",
  "Not everything needs to be solved tonight.",
  "You deserve softness, especially after days like this."
];

function dropWeight() {
  const messageBox = document.getElementById("message");
  const counter = document.getElementById("counter");
  const heart = document.getElementById("heart");

  if (clicks < messages.length) {
    messageBox.innerHTML = messages[clicks];
    messageBox.style.opacity = 1;
    clicks++;
    counter.innerHTML = clicks + " / 5 comfort drops";
  } else {
    messageBox.innerHTML = "Final unlock 💜 I'm really grateful you're in my life, Little Bunny.";
    counter.innerHTML = "All comfort unlocked 💜";
    bunnyRain();
  }

  heart.classList.add("show");
  setTimeout(() => {
    heart.classList.remove("show");
  }, 800);
}

/* Floating hearts */
setInterval(() => {
  const heart = document.createElement("div");
  heart.className = "floating-heart";
  heart.innerHTML = "💜";
  heart.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 6000);
}, 800);

/* Bunny rain */
function bunnyRain() {
  for (let i = 0; i < 20; i++) {
    const bunny = document.createElement("div");
    bunny.className = "bunny";
    bunny.innerHTML = "🐰";
    bunny.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(bunny);

    setTimeout(() => bunny.remove(), 5000);
  }
}
  /* === Responsive adjustment (phone + laptop) === */
@media (max-width: 768px) {
  body {
    padding: 20px;
  }

  .typewriter {
    font-size: 28px;
  }

  .subtitle {
    font-size: 20px;
  }

  p {
    font-size: 20px;
  }

  .message-box {
    font-size: 22px;
  }

  button {
    font-size: 18px;
    padding: 12px 20px;
  }

  .big-heart {
    font-size: 140px;
  }
}
</script>

</body>

</html>
