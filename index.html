<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Little Bunny 💜</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&display=swap" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #e4d0ff, #f3e8ff);
  font-family: 'Caveat', cursive;
  text-align: center;
  padding: 24px;
  color: #4b2e83;
  overflow-x: hidden;
}

/* TITLE */
h1 {
  font-size: 32px;
  min-height: 80px;
}

/* TEXT */
.subtitle {
  font-size: 20px;
  margin-bottom: 16px;
}

p {
  font-size: 20px;
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 14px 26px;
  font-size: 18px;
  border-radius: 30px;
  border: none;
  background-color: #b388ff;
  color: white;
  cursor: pointer;
}

/* COUNTER */
.counter {
  margin-top: 12px;
  font-size: 18px;
  font-weight: bold;
}

/* MESSAGE */
.message-box {
  font-size: 22px;
  margin-top: 20px;
  min-height: 60px;
  opacity: 1;
}

/* BIG HEART */
.big-heart {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  font-size: 160px;
  color: #c084fc;
  opacity: 0;
  pointer-events: none;
  transition: 0.6s ease;
  z-index: 9999;
}

.big-heart.show {
  transform: translate(-50%, -50%) scale(1.4);
  opacity: 1;
}

/* FLOATING HEARTS */
.floating-heart {
  position: fixed;
  bottom: -40px;
  font-size: 26px;
  animation: floatUp 5s linear forwards;
  pointer-events: none;
  z-index: 9998;
}

@keyframes floatUp {
  to { transform: translateY(-120vh); }
}
</style>
</head>

<body>

<h1 id="title"></h1>

<div class="subtitle">Especially not on days like today.</div>

<p>
Even strong girls like you get tired.<br>
This little purple world exists just for you.
</p>

<button onclick="dropWeight()">Drop One Worry 💜</button>

<div class="message-box" id="message"></div>
<div class="counter" id="counter">0 / 5 comfort drops</div>

<div class="big-heart" id="heart">💜</div>

<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8f8c1c1f2.mp3" type="audio/mpeg">
</audio>

<script>
/* ===== TYPING EFFECT (SAFE) ===== */
const titleText = "You Don’t Have To Carry Everything Alone, Little Bunny 💜";
let tIndex = 0;
function typeTitle() {
  if (tIndex < titleText.length) {
    document.getElementById("title").textContent += titleText.charAt(tIndex);
    tIndex++;
    setTimeout(typeTitle, 50);
  }
}
typeTitle();

/* ===== MAIN LOGIC ===== */
let clicks = 0;
let musicStarted = false;

const messages = [
  "Little Bunny, you handled more than you realize today.",
  "It’s okay to rest. The world can wait.",
  "You are someone people feel safe around.",
  "Not everything needs to be solved tonight.",
  "Goodbye 💜 Stay safe, little bunny."
];

function dropWeight() {
  if (clicks >= 5) return;

  const msg = document.getElementById("message");
  const counter = document.getElementById("counter");
  const heart = document.getElementById("heart");
  const music = document.getElementById("bgMusic");

  if (!musicStarted) {
    music.volume = 0.4;
    music.play().catch(()=>{});
    musicStarted = true;
  }

  msg.textContent = messages[clicks];
  clicks++;
  counter.textContent = clicks + " / 5 comfort drops";

  heart.classList.add("show");
  setTimeout(() => heart.classList.remove("show"), 600);

  /* MANY HEARTS */
  for (let i = 0; i < 8; i++) {
    createHeart();
  }
}

function createHeart() {
  const h = document.createElement("div");
  h.className = "floating-heart";
  h.textContent = "💜";
  h.style.left = Math.random() * 100 + "vw";
  document.body.appendChild(h);
  setTimeout(() => h.remove(), 5000);
}

/* CONTINUOUS HEART RAIN */
setInterval(createHeart, 700);
</script>

</body>
</html>
